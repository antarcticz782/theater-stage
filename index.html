<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>剧院</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=20260526-08">
  </head>
  <body>
    <main id="viewport" aria-label="剧院舞台">
      <div id="stage-window">
        <div id="stage" aria-hidden="true"></div>
      </div>
      <div id="rotate-device-hint" aria-hidden="true">请把手机横过来观看</div>
      <div id="loading">Loading</div>
    </main>
    <div id="crystal-ball-viewer" aria-hidden="true">
      <button id="crystal-ball-close" type="button" aria-label="关闭模型展示">×</button>
      <canvas id="crystal-ball-canvas"></canvas>
      <div id="crystal-ball-status" aria-live="polite"></div>
    </div>
    <script src="app.js?v=20260526-08"></script>
    <script type="module" src="crystal-ball.js?v=20260526-08"></script>
  </body>
</html>
