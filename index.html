<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Anoxia To Elysia</title>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/addons/"
        }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=20260528-06">
  </head>
  <body class="app-loading">
    <main id="viewport" aria-label="Anoxia To Elysia">
      <div id="stage-window">
        <div id="stage" aria-hidden="true"></div>
      </div>
      <div id="rotate-device-hint" aria-hidden="true">请把手机横过来观看</div>
      <div id="loading">
        <div class="loading-panel">
          <div class="loading-word" aria-live="polite">
            <span>Loding</span><span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
          </div>
          <div class="loading-bar" aria-hidden="true">
            <div id="loading-bar-fill"></div>
          </div>
          <div id="loading-percent">0%</div>
          <div id="loading-error" role="alert"></div>
        </div>
      </div>
    </main>
    <div id="crystal-ball-viewer" aria-hidden="true">
      <button id="crystal-ball-close" type="button" aria-label="关闭模型展示">×</button>
      <img class="viewer-guide" src="assets/ui/guide.png?v=20260528-06" alt="">
      <canvas id="crystal-ball-canvas"></canvas>
      <div id="crystal-ball-status" aria-live="polite"></div>
    </div>
    <div id="letter-viewer" aria-hidden="true">
      <button id="letter-close" type="button" aria-label="关闭信纸">×</button>
      <img class="viewer-guide" src="assets/ui/guide.png?v=20260528-06" alt="">
      <img id="letter-image" alt="信纸">
    </div>
    <script src="app.js?v=20260528-06"></script>
    <script type="module" src="crystal-ball.js?v=20260528-06"></script>
  </body>
</html>
